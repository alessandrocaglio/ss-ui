name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Test
        run: cd frontend && npm run test

  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Create frontend placeholder
        run: |
          mkdir -p backend/cmd/server/frontend/dist
          touch backend/cmd/server/frontend/dist/.gitkeep
      - name: Format check
        env:
          GOTOOLCHAIN: local
        run: cd backend && [ -z "$(gofmt -l .)" ] || (gofmt -d . && exit 1)
      - name: Lint (Vet)
        env:
          GOTOOLCHAIN: local
        run: cd backend && go vet ./...
      - name: Test
        env:
          GOTOOLCHAIN: local
        run: cd backend && go test -v -cover ./...
