name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Sync Frontend for Embedding
        run: |
          mkdir -p backend/cmd/server/frontend
          cp -r frontend/dist backend/cmd/server/frontend/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOTOOLCHAIN: local

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ github.ref_name }}"
          DATE=$(date +%Y-%m-%d)
          
          # Get changelog content from goreleaser output or generate a summary
          echo -e "# Changelog\n\n## $VERSION ($DATE)\n" > NEW_CHANGELOG.md
          
          # Use git log to get changes since last tag if goreleaser output isn't easily accessible
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline --pretty=format:"* %s" >> NEW_CHANGELOG.md
          echo -e "\n" >> NEW_CHANGELOG.md
          
          if [ -f CHANGELOG.md ]; then
            # Strip the header if it exists and append old changelog
            tail -n +2 CHANGELOG.md >> NEW_CHANGELOG.md
          fi
          
          mv NEW_CHANGELOG.md CHANGELOG.md

      - name: Commit CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]"
          file_pattern: 'CHANGELOG.md'
